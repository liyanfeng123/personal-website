<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人网站 - 首页</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 导航栏 -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">MyPortfolio</a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html" class="active">首页</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Hero 区域 -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-greeting">你好，我是</p>
      <h1 class="hero-name">你的名字</h1>
      <p class="hero-desc">一名热爱技术与创造的开发者 ✨</p>
      <div class="hero-buttons">
        <a href="about.html" class="btn btn-primary">了解我</a>
        <a href="mailto:your@email.com" class="btn btn-outline">联系我</a>
      </div>
    </div>
    <div class="hero-avatar">
      <div class="avatar-placeholder">😊</div>
    </div>
  </section>

  <!-- 技能区域 -->
  <section class="skills">
    <div class="container">
      <h2 class="section-title">我的技能</h2>
      <div class="skills-grid">
        <div class="skill-card">
          <span class="skill-icon">💻</span>
          <h3>前端开发</h3>
          <p>HTML、CSS、JavaScript，构建美观的用户界面</p>
        </div>
        <div class="skill-card">
          <span class="skill-icon">⚙️</span>
          <h3>后端开发</h3>
          <p>Python、Node.js，搭建稳健的服务端应用</p>
        </div>
        <div class="skill-card">
          <span class="skill-icon">🎨</span>
          <h3>UI 设计</h3>
          <p>注重用户体验，设计简洁现代的界面风格</p>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 你的名字 · 用 ❤️ 构建</p>
      <div class="social-links">
        <a href="https://github.com/your-username" target="_blank">GitHub</a>
        <span>·</span>
        <a href="mailto:your@email.com">Email</a>
      </div>
    </div>
  </footer>

</body>
</html>
